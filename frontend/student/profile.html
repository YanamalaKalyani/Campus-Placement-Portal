<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Student Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <div class="sidebar-logo-text">
                        <h2>Campus Portal</h2>
                        <p>Student Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="companies.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Companies</span>
                </a>
                <a href="profile.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>My Profile</span>
                </a>
                <a href="applications.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span>Applications</span>
                </a>
                <a href="notifications.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span>Notifications</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h1>My Profile</h1>
                    <p>Manage your profile information</p>
                </div>
                <div class="user-info">
                    <div class="user-details">
                        <span class="user-name" id="userName">Student</span>
                        <span class="user-role">Student</span>
                    </div>
                    <div class="user-avatar" id="userAvatar">S</div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="dashboard-card" style="max-width: 600px;">
                    <div class="card-header">
                        <h3>Profile Information</h3>
                    </div>
                    
                    <div id="alertContainer"></div>
                    
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" id="name" name="name" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-input" disabled>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="branch" class="form-label">Branch</label>
                                <select id="branch" name="branch" class="form-select">
                                    <option value="CSE">CSE</option>
                                    <option value="ECE">ECE</option>
                                    <option value="CE">CE</option>
                                    <option value="Mechanical">Mechanical</option>
                                    <option value="Civil">Civil</option>
                                    <option value="EE">Electrical Engineering</option>
                                    <option value="IT">Information Technology</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="semester" class="form-label">Semester</label>
                                <input type="number" id="semester" name="semester" class="form-input" min="1" max="12">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="tenth" class="form-label">10th %</label>
                                <input type="number" id="tenth" name="tenth" class="form-input" step="0.01" min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="twelfth" class="form-label">12th %</label>
                                <input type="number" id="twelfth" name="twelfth" class="form-input" step="0.01" min="0" max="100">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cgpa" class="form-label">CGPA</label>
                                <input type="number" id="cgpa" name="cgpa" class="form-input" step="0.01" min="0" max="10">
                            </div>
                            <div class="form-group">
                                <label for="backlogs" class="form-label">Backlogs</label>
                                <input type="number" id="backlogs" name="backlogs" class="form-input" min="0" step="1">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" id="phone" name="phone" class="form-input">
                        </div>
                        
                        <div class="form-group">
                            <label for="certifications" class="form-label">Certifications</label>
                            <input type="text" id="certifications" name="certifications" class="form-input" placeholder="e.g., AWS, Oracle">
                        </div>
                        <div class="form-group">
                            <label for="internship" class="form-label">Internship</label>
                            <input type="text" id="internship" name="internship" class="form-input" placeholder="e.g., 6-month internship">
                        </div>
                        <div class="form-group">
                            <label for="projects" class="form-label">Projects</label>
                            <textarea id="projects" name="projects" class="form-input" rows="3" placeholder="Project descriptions"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="skills" class="form-label">Skills (comma separated)</label>
                            <textarea id="skills" name="skills" class="form-input" rows="3" placeholder="e.g., Python, JavaScript, React, Node.js"></textarea>
                        </div>
                        
                        <div class="form-group" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                            <label class="form-label">Resume (PDF/DOC/DOCX)</label>
                            <div style="display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap;">
                                <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" style="display: none;">
                                <button type="button" class="btn btn-secondary" onclick="document.getElementById('resumeFile').click()" style="padding: 0.5rem 1rem;">Choose File</button>
                                <span id="fileNameDisplay" style="font-size: 0.875rem; color: var(--text-secondary); flex: 1; min-width: 150px;">No file chosen</span>
                                <button type="button" class="btn btn-primary" id="uploadResumeBtn" onclick="uploadResume()" style="padding: 0.5rem 1rem; background-color: var(--accent-green);">Upload Resume</button>
                            </div>
                            <div id="currentResumeInfo" style="margin-top: 0.75rem; font-size: 0.875rem; font-weight: 500;"></div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        (async function() {
            const user = await checkAuth('student');
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
                loadProfile();
            }
        })();

        async function loadProfile() {
            try {
                const response = await fetch('/api/student/profile', {
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('Failed to load profile');
                
                const data = await response.json();
                const student = data.student;
                
                document.getElementById('name').value = student.name || '';
                document.getElementById('email').value = student.email || '';
                document.getElementById('branch').value = student.branch || 'CSE';
                document.getElementById('semester').value = student.semester || '';
                document.getElementById('tenth').value = student.tenth || '';
                document.getElementById('twelfth').value = student.twelfth || '';
                document.getElementById('cgpa').value = student.cgpa || '';
                document.getElementById('backlogs').value = student.backlogs || '';
                document.getElementById('phone').value = student.phone || '';
                document.getElementById('skills').value = student.skills || '';
                document.getElementById('certifications').value = student.certifications || '';
                document.getElementById('internship').value = student.internship || '';
                document.getElementById('projects').value = student.projects || '';
                
                if (student.resume_path) {
                    document.getElementById('currentResumeInfo').innerHTML = `
                        <span style="color: var(--accent-green);">✓ Resume Uploaded:</span> 
                        <a href="/uploads/resumes/${student.resume_path}" target="_blank" style="color: var(--accent-blue); text-decoration: underline; margin-left: 5px;">View Current Resume</a>
                    `;
                } else {
                    document.getElementById('currentResumeInfo').innerHTML = '<span style="color: var(--text-light);">No resume uploaded yet.</span>';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                branch: document.getElementById('branch').value,
                semester: parseInt(document.getElementById('semester').value) || 1,
                tenth: parseFloat(document.getElementById('tenth').value) || 0,
                twelfth: parseFloat(document.getElementById('twelfth').value) || 0,
                cgpa: parseFloat(document.getElementById('cgpa').value) || 0,
                backlogs: parseInt(document.getElementById('backlogs').value) || 0,
                phone: document.getElementById('phone').value,
                skills: document.getElementById('skills').value,
                certifications: document.getElementById('certifications').value,
                internship: document.getElementById('internship').value,
                projects: document.getElementById('projects').value
            };
            
            try {
                const response = await fetch('/api/student/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data),
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlertLocal('Profile updated successfully!', 'success');
                } else {
                    showAlertLocal(result.error || 'Failed to update profile', 'error');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showAlertLocal('Network error. Please try again.', 'error');
            }
        });

        function showAlertLocal(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        async function uploadResume() {
            const fileInput = document.getElementById('resumeFile');
            if (fileInput.files.length === 0) {
                alert('Please select a file first');
                return;
            }

            const formData = new FormData();
            formData.append('resume', fileInput.files[0]);

            const btn = document.getElementById('uploadResumeBtn');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            try {
                const response = await fetch('/api/student/upload_resume', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });

                const result = await response.json();
                if (response.ok) {
                    alert('Resume uploaded successfully!');
                    loadProfile(); 
                } else {
                    alert(result.error || 'Upload failed');
                }
            } catch (error) {
                console.error('Error uploading resume:', error);
                alert('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload Resume';
            }
        }

        document.getElementById('resumeFile').addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : 'No file chosen';
            document.getElementById('fileNameDisplay').textContent = fileName;
        });
    </script>
    <script src="../js/notifications.js"></script>
</body>
</html>
