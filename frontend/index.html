<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Placement Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="landing-container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                </svg>
            </div>
        </div>

        <!-- Title -->
        <h1 class="portal-title">Campus Placement Portal</h1>
        <p class="portal-subtitle">Connecting talent with opportunity</p>

        <!-- Login Cards -->
        <div class="login-cards">
            <!-- Admin Login -->
            <div class="login-card">
                <div class="card-icon admin-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <h3 class="card-title">Admin Login</h3>
                <p class="card-description">Manage companies, students, and placements</p>
                <a href="login.html?role=admin" class="card-link">Continue <span>&rarr;</span></a>
            </div>

            <!-- Student Login -->
            <div class="login-card">
                <div class="card-icon student-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                    </svg>
                </div>
                <h3 class="card-title">Student Login</h3>
                <p class="card-description">Apply to companies and track your progress</p>
                <a href="login.html?role=student" class="card-link student-link">Continue <span>&rarr;</span></a>
            </div>

            <!-- Company Login -->
            <div class="login-card">
                <div class="card-icon company-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <h3 class="card-title">Company Login</h3>
                <p class="card-description">Recruit talent and manage placements</p>
                <a href="login.html?role=company" class="card-link company-link">Continue <span>&rarr;</span></a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
