<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

        <!-- Sidebar -->

                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">

                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <div class="sidebar-logo-text">
                        <h2>Campus Portal</h2>
                        <p>Admin Dashboard</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="companies.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Companies</span>
                </a>
                <a href="students.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Students</span>
                </a>
                <a href="stats.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <span>Placement Stats</span>
                </a>

                <a href="drives.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Placement Drives</span>
                </a>
                <a href="notifications.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span>Notifications</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h1>Students</h1>
                    <p>Manage registered students</p>
                </div>
                <div class="user-info">
                    <div class="user-details">
                        <span class="user-name" id="userName">Super Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar" id="userAvatar">S</div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="dashboard-card">
                    <div class="card-header">
                        <h3>Registered Students</h3>
                    </div>
                    <div class="filter-bar">
                        <div class="search-bar" style="flex: 1; margin-bottom: 0;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="searchInput" placeholder="Search students..." onkeyup="filterTable()">
                        </div>
                        <select class="filter-select" id="branchFilter" onchange="filterTable()">
                            <option value="">All Branches</option>
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="CE">CE</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                        </select>
                        <select class="filter-select" id="statusFilter" onchange="filterTable()">
                            <option value="">All Status</option>
                            <option value="placed">Placed</option>
                            <option value="unplaced">Unplaced</option>
                        </select>
                    </div>
                    <div class="info-banner" style="background-color: #ebf4ff; border: 1px solid #dbeafe; color: #1e3a8a; padding: 1rem 1.5rem; border-radius: var(--radius-md); font-size: 0.875rem; margin: 1.5rem 0; font-weight: 500; display: inline-block; width: 100%;">
                        <span>Total Registered Students: </span>
                        <strong id="totalStudentsCount" style="color: var(--accent-blue);">0</strong>
                    </div>

                    <div class="student-profiles-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;" id="studentsTableBody">
                        <!-- Populated by JavaScript -->
                    </div>
                    
                    <div id="emptyState" class="empty-state hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                        </svg>
                        <p>No students registered yet</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        let studentsData = [];
        
        (async function() {
            const user = await checkAuth('admin');
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
                loadStudents();
            }
        })();

        async function loadStudents() {
            try {
                const response = await fetch('/api/admin/students', {
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('Failed to load students');
                
                const data = await response.json();
                studentsData = data.students;
                renderStudents(studentsData);
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        function renderStudents(students) {
            const tbody = document.getElementById('studentsTableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (students.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            document.getElementById('totalStudentsCount').textContent = students.length;
            
            tbody.innerHTML = students.map(student => `
                <div class="dashboard-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                    <div style="margin-bottom: 1.5rem;">
                        <h3 style="font-size: 1.125rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem;">${student.name}</h3>
                        <span style="font-size: 0.75rem; color: var(--text-secondary);">${student.enrollment_number || 'EN N/A'}</span>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.875rem; margin-bottom: 1.5rem; flex: 1;">
                        <div style="display: flex;"><span style="color: var(--text-secondary); width: 60px;">CGPA:</span><span style="font-weight: 500;">${student.cgpa || 'N/A'}</span></div>
                        <div style="display: flex;"><span style="color: var(--text-secondary); width: 60px;">Branch:</span><span style="font-weight: 500;">${student.branch || 'Not specified'}</span></div>
                        <div style="display: flex;"><span style="color: var(--text-secondary); width: 60px;">Email:</span><span style="font-weight: 500; word-break: break-all;">${student.email}</span></div>
                        <div style="display: flex;"><span style="color: var(--text-secondary); width: 60px;">Skills:</span><span style="font-weight: 500;">${student.skills || 'Not specified'}</span></div>
                        ${student.phone ? `<div style="display: flex;"><span style="color: var(--text-secondary); width: 60px;">Phone:</span><span style="font-weight: 500;">${student.phone}</span></div>` : ''}
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" style="flex: 1; border-radius: 9999px;" onclick="viewStudent(${student.id})">View Profile</button>
                    </div>
                </div>
            `).join('');
        }

        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const branchFilter = document.getElementById('branchFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            const filtered = studentsData.filter(student => {
                const matchesSearch = student.name.toLowerCase().includes(searchTerm) ||
                                     student.email.toLowerCase().includes(searchTerm);
                const matchesBranch = !branchFilter || student.branch === branchFilter;
                const matchesStatus = !statusFilter || student.placement_status === statusFilter;
                
                return matchesSearch && matchesBranch && matchesStatus;
            });
            
            renderStudents(filtered);
        }

        function viewStudent(studentId) {
            window.location.href = `student_detail.html?id=${studentId}`;
        }

        // Removed editStudent as it's now integrated into view profile page


    </script>
</body>
</html>
